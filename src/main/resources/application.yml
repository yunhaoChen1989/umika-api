spring:
  application:
    name: umika-api
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/umika}
    username: ${DB_USERNAME:chen}
    password: ${DB_PASSWORD:}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    baseline-on-migrate: true
    baseline-version: 9
    locations: filesystem:/Users/chen/Library/CloudStorage/GoogleDrive-sucre19890307@gmail.com/My Drive/umikaSushi/SQL

server:
  port: ${SERVER_PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: health,info

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha

logging:
  level:
    org.springframework.security: INFO

jwt:
  secret: "myverysecuresecretkeymyverysecuresecretkey"
  expirationMs: 3600000

google:
  oauth:
    client-id: ${GOOGLE_OAUTH_CLIENT_ID:395014484643-u08rnbc9um0khs2o49md9chm6mjq6up9.apps.googleusercontent.com}
    callback-uri: ${GOOGLE_OAUTH_CALLBACK_URI:https://Umikasushi.ca/api/v1/auth/google}

app:
  public-base-url: ${APP_PUBLIC_BASE_URL:https://umikasushi.ca}
  upload:
    base-dir: /Users/chen/Library/CloudStorage/GoogleDrive-sucre19890307@gmail.com/My Drive/umikaSushi/backend/umika-api/uploads
