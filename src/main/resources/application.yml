spring:
  application:
    name: umika-api
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/umika}
    username: ${DB_USERNAME:chen}
    password: ${DB_PASSWORD:}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: ${FLYWAY_ENABLED:false}
    locations: ${FLYWAY_LOCATIONS:filesystem:../../SQL}

server:
  port: ${SERVER_PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: health,info

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha

logging:
  level:
    org.springframework.security: INFO

jwt:
  secret: "myverysecuresecretkeymyverysecuresecretkey"
  expirationMs: 3600000
